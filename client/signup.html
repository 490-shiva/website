<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — Shiva Suthar</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="new.css" />
</head>

<body class="auth-body">

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">
                <div class="logo">SS</div>
                <span class="brand-name">Shiva Suthar</span>
            </a>

            <ul class="nav-links">
                <li><a href="new.html#home">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#news">News</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>

            <div class="navbar-actions">
                <a href="new.html" class="btn btn-back">
                    ← Back to Home
                </a>
                <a href="login.html" class="btn btn-login">Login</a>
            </div>

            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </nav>

        <div class="mobile-menu" id="mobile-menu">
            <a href="index.html#home">Home</a>
            <a href="index.html#about">About</a>
            <a href="index.html#news">News</a>
            <a href="index.html#contact">Contact</a>
            <div class="mobile-btns">
                <a href="index.html" class="btn btn-back" style="text-align:center;">← Back to Home</a>
                <a href="login.html" class="btn btn-login" style="text-align:center;">Login</a>
            </div>
        </div>
    </header>

    <!-- Sign Up Section -->
    <main class="auth-main">
        <div class="auth-card">

            <!-- Header -->
            <div class="auth-header">
                <div class="auth-logo">SS</div>
                <h1>Create Account</h1>
                <p>Join Shiva Suthar — it's free!</p>
            </div>

            <!-- Google Sign Up -->
            <button class="btn-google" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#FFC107"
                        d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z" />
                    <path fill="#FF3D00"
                        d="M6.3 14.7l6.6 4.8C14.7 16 19.1 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" />
                    <path fill="#4CAF50"
                        d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.4 26.8 36 24 36c-5.2 0-9.6-3.1-11.3-7.5l-6.5 5C9.5 39.6 16.2 44 24 44z" />
                    <path fill="#1976D2"
                        d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.6l6.2 5.2C41.3 35.7 44 30.3 44 24c0-1.2-.1-2.4-.4-3.5z" />
                </svg>
                Continue with Google
            </button>

            <!-- Divider -->
            <div class="auth-divider">
                <span></span>
                <p>or sign up with email</p>
                <span></span>
            </div>

            <!-- Form -->
            <form class="auth-form" id="signup-form" novalidate>

                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username <span class="required">*</span></label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            width="18" height="18">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="username" name="username" placeholder="e.g. shiva_suthar"
                            autocomplete="username" />
                    </div>
                    <span class="field-error" id="err-username"></span>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            width="18" height="18">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.06 6.06l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
                        </svg>
                        <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" autocomplete="tel" />
                    </div>
                    <span class="field-error" id="err-phone"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            width="18" height="18">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        <input type="email" id="email" name="email" placeholder="shiva@example.com"
                            autocomplete="email" />
                    </div>
                    <span class="field-error" id="err-email"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            width="18" height="18">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Min. 8 characters"
                            autocomplete="new-password" />
                        <button type="button" class="toggle-pw" data-target="password" aria-label="Toggle password">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                width="18" height="18">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <div class="password-strength" id="pw-strength">
                        <div class="strength-bar"><span id="strength-fill"></span></div>
                        <p id="strength-label"></p>
                    </div>
                    <span class="field-error" id="err-password"></span>
                </div>

                <!-- Re-enter Password -->
                <div class="form-group">
                    <label for="repassword">Confirm Password <span class="required">*</span></label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            width="18" height="18">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        </svg>
                        <input type="password" id="repassword" name="repassword" placeholder="Re-enter your password"
                            autocomplete="new-password" />
                        <button type="button" class="toggle-pw" data-target="repassword"
                            aria-label="Toggle confirm password">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                width="18" height="18">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <span class="field-error" id="err-repassword"></span>
                </div>

                <!-- Terms -->
                <div class="form-check">
                    <input type="checkbox" id="terms" name="terms" />
                    <label for="terms">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>
                <span class="field-error" id="err-terms"></span>

                <!-- Submit -->
                <button type="submit" class="btn-submit">Create Account</button>

            </form>

            <!-- Login redirect -->
            <p class="auth-switch">
                Already have an account? <a href="login.html">Login here</a>
            </p>

        </div>
    </main>
    <script src="signup.js"></script>


</body>

</html>
